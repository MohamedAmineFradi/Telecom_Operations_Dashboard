server:
  port: 8080

app:
  streaming:
    enabled: true
  service: traffic
  traffic:
    congestion:
      low-max: ${APP_TRAFFIC_CONGESTION_LOW_MAX:500}
      medium-max: ${APP_TRAFFIC_CONGESTION_MEDIUM_MAX:2000}

kafka:
  topics:
    traffic: ${KAFKA_TOPIC_TRAFFIC:activity.traffic}

spring:
  application:
    name: TRAFFIC-SERVICE
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: ${SPRING_KAFKA_STREAMS_APPLICATION_ID:traffic-service-streams}
      properties:
        state.dir: ${SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR:/tmp/kafka-streams}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.telecom_operations_dashboard.common.dto.event
        spring.json.value.default.type: org.telecom_operations_dashboard.common.dto.event.TrafficEvent
        spring.json.use.type.headers: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: ${MANAGEMENT_HEALTH_KAFKA_ENABLED:true}
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}
