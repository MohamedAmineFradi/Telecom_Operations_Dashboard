# KRaft single-node configuration
process.roles=broker,controller
node.id=1
controller.quorum.voters=1@kafka:9093

# Listeners
listeners=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
advertised.listeners=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
controller.listener.names=CONTROLLER
inter.broker.listener.name=INTERNAL

# Log dirs
log.dirs=/opt/kafka/data

# Single-node replication settings
offsets.topic.replication.factor=1
offsets.topic.num.partitions=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
transaction.state.log.num.partitions=1

# Reduce coordinator/topic overhead for single-node dev
share.coordinator.state.topic.replication.factor=1
share.coordinator.state.topic.min.isr=1
share.coordinator.state.topic.num.partitions=1
group.coordinator.num.threads=1

# Consumer group coordinator settings (Kafka 4.x KRaft)
group.coordinator.rebalance.protocols=classic,consumer

# ── Memory-pressure reduction (dev / single-node) ─────────────────────────
# Smaller socket buffers  → less pinned native memory per connection
socket.send.buffer.bytes=65536
socket.receive.buffer.bytes=65536

# Smaller log segments → less file-handle / page-cache overhead per partition
log.segment.bytes=67108864
log.retention.bytes=268435456
num.recovery.threads.per.data.dir=1

# Limit the maximum message size that brokers will fetch in one go
replica.fetch.max.bytes=1048576

# Background threads – drop from default (8+) to reduce heap churn
num.network.threads=3
num.io.threads=4

# Log retention – keep 1 h of data so Kafka Streams replay stays bounded
log.retention.hours=1
auto.create.topics.enable=true
log.retention.check.interval.ms=300000
