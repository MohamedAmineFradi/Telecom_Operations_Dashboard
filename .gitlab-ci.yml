workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"


stages:
  - test
  - package
  - container
  - deploy                    # déploiement stage ajouté après la construction des images

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  # Ces variables sont définies dans GitLab Settings > CI/CD > Variables
  # AZURE_VM_APPS_IP
  # AZURE_SSH_PRIVATE_KEY
  # CI_REGISTRY_USER
  # CI_REGISTRY_PASSWORD
  # SONAR_TOKEN
  # SONAR_HOST_URL

  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"  # Defines the location of the analysis task cache
  GIT_DEPTH: "0"  # Tells git to fetch all the branches of the project, required by the analysis task



default:
  image: maven:3.9.9-eclipse-temurin-21
  cache:
    key: "$CI_PROJECT_ID-maven"
    paths:
      - .m2/repository

# --- ÉTAPE 1: TESTS + SONAR ---
test-and-sonar:
  stage: test
  cache:
    key: sonar-cache
    paths:
      - .sonar/cache
  script:
    - mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:4.0.0.4121:sonar -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"

# --- ÉTAPE 2: PACKAGING JAR ---
package-services:
  stage: package
  parallel:
    matrix:
      - SERVICE: "alert-service"
      - SERVICE: "call-service"
      - SERVICE: "cell-service"
      - SERVICE: "gateway-service"
      - SERVICE: "internet-service"
      - SERVICE: "mobility-service"
      - SERVICE: "producer"
      - SERVICE: "sms-service"
      - SERVICE: "traffic-service"
  script:
    - mvn -B -pl "$SERVICE" -am -DskipTests clean package
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - "$SERVICE/target/*.jar"

# --- ÉTAPE 3: BUILD & PUSH DOCKER IMAGES ---
build-and-push-images:
  stage: container

  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    DOCKER_CONFIG: /kaniko/.docker
  parallel:
    matrix:
      - SERVICE: "alert-service"
      - SERVICE: "call-service"
      - SERVICE: "cell-service"
      - SERVICE: "gateway-service"
      - SERVICE: "internet-service"
      - SERVICE: "mobility-service"
      - SERVICE: "producer"
      - SERVICE: "sms-service"
      - SERVICE: "traffic-service"
  needs:
    - job: package-services
      parallel:
        matrix:
          - SERVICE: ['$[[ matrix.SERVICE ]]']
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "$CI_REGISTRY": {
            "username": "$CI_REGISTRY_USER",
            "password": "$CI_REGISTRY_PASSWORD"
          }
        }
      }
      EOF
  script:
    # Adaptation du nom d'image pour correspondre à notre structure GitLab
    - IMAGE_NAME="$CI_REGISTRY_IMAGE/$SERVICE" 
    - JAR_PATH=$(ls "$SERVICE"/target/*.jar 2>/dev/null | head -n 1)
    - 'test -n "$JAR_PATH" || (echo "ERROR: no JAR artifact found for $SERVICE in $SERVICE/target" && exit 1)'
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/$SERVICE/Dockerfile" --destination "$IMAGE_NAME:$CI_COMMIT_SHA" --destination "$IMAGE_NAME:latest"



# --- ÉTAPE 4: DÉPLOIEMENT SUR AZURE VM ---
deploy-to-vm:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build-and-push-images
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$AZURE_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $AZURE_VM_APPS_IP >> ~/.ssh/known_hosts
  script:
    - |
      REMOTE_USER=azureuser
      REMOTE_HOST="$REMOTE_USER@$AZURE_VM_APPS_IP"
      REMOTE_DIR="/home/$REMOTE_USER/telecom-apps"

      echo '[deploy] Ensuring remote directory ownership'
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$REMOTE_HOST" "sudo mkdir -p $REMOTE_DIR && sudo chown -R $REMOTE_USER:$REMOTE_USER $REMOTE_DIR"

      echo '[deploy] Syncing deployment files'
      rsync -avz \
        -e 'ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no' \
        docker-compose.yml \
        check_apis.sh \
        jmx_prometheus_javaagent-1.0.1.jar \
        kafka-jmx-config.yml \
        prometheus.yml \
        "$REMOTE_HOST:$REMOTE_DIR/"

      echo '[deploy] Running remote deployment commands'
      ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no "$REMOTE_HOST" "
        set -e
        cd '$REMOTE_DIR'

        if docker compose version >/dev/null 2>&1; then
          COMPOSE_CMD='docker compose'
          echo '[deploy] Using docker compose (v2 plugin)'
        elif command -v docker-compose >/dev/null 2>&1; then
          COMPOSE_CMD='docker-compose'
          echo '[deploy] Using docker-compose (v1 binary)'
        else
          echo 'ERROR: neither docker compose nor docker-compose is available on VM'
          exit 1
        fi

        echo '[deploy] Docker registry login...'
        echo '$CI_REGISTRY_PASSWORD' | sudo docker login '$CI_REGISTRY' -u '$CI_REGISTRY_USER' --password-stdin
        echo '[deploy] Docker registry login done'

        echo '[deploy] Pulling images...'
        sudo $COMPOSE_CMD pull
        echo '[deploy] Pull done'

        echo '[deploy] Recreating containers...'
        sudo $COMPOSE_CMD up -d --remove-orphans
        echo '[deploy] Containers recreated'
        sudo $COMPOSE_CMD ps || true

        echo '[deploy] Pruning old images...'
        sudo docker image prune -f
        echo '[deploy] Prune done'
        echo '[deploy] Deploy script finished successfully'
      "