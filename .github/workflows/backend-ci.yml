name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build with Maven (compile  + package)
      run: mvn clean verify  -DskipTests

    - name: Verify Dockerfiles exist 
      run: |
        for service in alert-service call-service cell-service gateway-service internet-service mobility-service producer sms-service traffic-service; do
          if [ ! -f "$service/Dockerfile" ]; then
            echo "Missing Dockerfile in $service"
            exit 1
          fi
        done
        echo "All Dockerfiles present"

    # construire une image de test (par exemple pour le gateway)
    - name: Build test image for gateway
      run: |
        docker build -t telecom-gateway-test -f gateway-service/Dockerfile .