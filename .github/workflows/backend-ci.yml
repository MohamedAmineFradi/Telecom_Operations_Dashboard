name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test-modules:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - common
          - alert-service
          - call-service
          - cell-service
          - gateway-service
          - internet-service
          - mobility-service
          - producer
          - sms-service
          - traffic-service

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Test module ${{ matrix.module }}
      run: mvn -B -pl ${{ matrix.module }} -am test

  build-and-publish:
    runs-on: ubuntu-latest
    needs: test-modules

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Package all modules (without tests)
      run: mvn -B -DskipTests clean package

    - name: Verify Dockerfiles exist 
      run: |
        for service in alert-service call-service cell-service gateway-service internet-service mobility-service producer sms-service traffic-service; do
          if [ ! -f "$service/Dockerfile" ]; then
            echo "Missing Dockerfile in $service"
            exit 1
          fi
        done
        echo "All Dockerfiles present"

    - name: Build Docker images (validation)
      run: |
        for service in alert-service call-service cell-service gateway-service internet-service mobility-service producer sms-service traffic-service; do
          docker build -t telecom-$service:test-${{ github.sha }} -f "$service/Dockerfile" .
        done

    - name: Login to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker images to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/telecom
      run: |
        for service in alert-service call-service cell-service gateway-service internet-service mobility-service producer sms-service traffic-service; do
          image="$IMAGE_PREFIX-$service"
          docker tag "telecom-$service:test-${{ github.sha }}" "$image:${{ github.sha }}"
          docker tag "telecom-$service:test-${{ github.sha }}" "$image:latest"
          docker push "$image:${{ github.sha }}"
          docker push "$image:latest"
        done

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test-modules

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Skip SonarCloud (missing secrets)
      if: ${{ secrets.SONAR_TOKEN == '' || secrets.SONAR_PROJECT_KEY == '' || secrets.SONAR_ORGANIZATION == '' }}
      run: echo "Skipping SonarCloud: SONAR_TOKEN/SONAR_PROJECT_KEY/SONAR_ORGANIZATION not fully configured"

    - name: SonarCloud analysis
      if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_PROJECT_KEY != '' && secrets.SONAR_ORGANIZATION != '' }}
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
          -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
          -Dsonar.host.url=https://sonarcloud.io