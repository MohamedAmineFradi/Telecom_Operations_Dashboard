name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  test-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - common
          - alert-service
          - call-service
          - cell-service
          - gateway-service
          - internet-service
          - mobility-service
          - producer
          - sms-service
          - traffic-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test module
        run: mvn -B -pl ${{ matrix.module }} -am test

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: test-modules
    strategy:
      fail-fast: false
      matrix:
        service:
          - alert-service
          - call-service
          - cell-service
          - gateway-service
          - internet-service
          - mobility-service
          - producer
          - sms-service
          - traffic-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package service JAR
        run: mvn -B -pl ${{ matrix.service }} -am -DskipTests clean package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute GHCR image owner (lowercase)
        id: image_meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "owner_lc=$(echo \"$REPO_OWNER\" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image per service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.image_meta.outputs.owner_lc }}/telecom-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ steps.image_meta.outputs.owner_lc }}/telecom-${{ matrix.service }}:latest
          cache-from: type=gha,scope=telecom-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=telecom-${{ matrix.service }}

  sonarcloud:
    runs-on: ubuntu-latest
    needs: test-modules

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: SonarCloud analysis (single run)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: mohamedaminefradi
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_PROJECT_KEY" ]; then
            echo "Skipping SonarCloud: SONAR_TOKEN/SONAR_PROJECT_KEY not fully configured"
            exit 0
          fi

          set +e
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
            -Dsonar.organization="$SONAR_ORGANIZATION" \
            -Dsonar.host.url=https://sonarcloud.io | tee sonar.log
          sonar_status=${PIPESTATUS[0]}
          set -e

          if grep -q "You are running CI analysis while Automatic Analysis is enabled" sonar.log; then
            echo "SonarCloud Automatic Analysis is enabled for this project. Skipping CI scanner result to avoid duplicate analysis conflict."
            exit 0
          fi

          exit $sonar_status
