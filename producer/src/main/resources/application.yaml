spring:
  application:
    name: producer
  jmx:
    enabled: false
  main:
    lazy-initialization: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/milan_telecom}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 0
      maximum-pool-size: 2
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      acks: all
      retries: 10
      enable-idempotence: true
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        buffer.memory: 33554432
        batch.size: 32768
        linger.ms: 10
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        
app:
  simulation:
    start: ${APP_SIMULATION_START:2013-11-01T00:00:00Z}
    end: ${APP_SIMULATION_END:2013-11-07T23:59:59Z}
    step: ${APP_SIMULATION_STEP:PT1H}
    batch-size: ${APP_SIMULATION_BATCH_SIZE:100}

producer:
  poll:
    interval-ms: ${PRODUCER_POLL_INTERVAL_MS:600000}
    initial-delay-ms: ${PRODUCER_POLL_INITIAL_DELAY_MS:5000}
    mobility-initial-delay-ms: ${PRODUCER_MOBILITY_POLL_INITIAL_DELAY_MS:5000}
  kafka-health:
    enabled: ${PRODUCER_KAFKA_HEALTH_ENABLED:false}

server:
  port: 8108

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  health:
    kafka:
      enabled: ${MANAGEMENT_HEALTH_KAFKA_ENABLED:true}
  prometheus:
    metrics:
      export:
        enabled: ${MANAGEMENT_PROMETHEUS_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.example.producer: INFO
    org.springframework.kafka: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port:${PORT:8080}}