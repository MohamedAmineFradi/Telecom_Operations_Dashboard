services:
  traffic-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PROFILE: traffic-service
        JAR_NAME: traffic-service.jar
    container_name: telecom-traffic-service
    networks:
      - kafka-net
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: TRAFFIC-SERVICE
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  alert-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PROFILE: alert-service
        JAR_NAME: alert-service.jar
    container_name: telecom-alert-service
    networks:
      - kafka-net
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: ALERT-SERVICE
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  cell-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PROFILE: cell-service
        JAR_NAME: cell-service.jar
    container_name: telecom-cell-service
    networks:
      - kafka-net
    ports:
      - "8084:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: CELL-SERVICE
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  mobility-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_PROFILE: mobility-service
        JAR_NAME: mobility-service.jar
    container_name: telecom-mobility-service
    networks:
      - kafka-net
    ports:
      - "8085:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: MOBILITY-SERVICE
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server.Dockerfile
    container_name: telecom-eureka
    networks:
      - kafka-net
    ports:
      - "8761:8761"
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.1
    hostname: kafka
    container_name: telecom-kafka
    networks:
      - kafka-net
    ports:
      - "9092:9092"   # External clients
      - "7071:7071"   # Prometheus metrics
    environment:
      # Used by manual format command below
      CLUSTER_ID: "4L6g3nShT8qIEaYHq5ZqWA"

      # Keep Kafka memory bounded while leaving native/off-heap headroom
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx384m"
      
      # JMX Exporter configuration
      KAFKA_OPTS: "-javaagent:/opt/kafka/jmx_exporter.jar=7071:/opt/kafka/kafka-jmx-config.yml"
    volumes:
      - ./volumes/kafka-data:/opt/kafka/data
      - ./monitoring/kafka-server.properties:/opt/kafka/config/server.properties
      - ./monitoring/jmx_prometheus_javaagent-1.0.1.jar:/opt/kafka/jmx_exporter.jar
      - ./monitoring/kafka-jmx-config.yml:/opt/kafka/kafka-jmx-config.yml
    mem_limit: 1024m
    restart: unless-stopped
    command: >
      bash -c "
        if [ ! -f /opt/kafka/data/meta.properties ]; then
          echo \"Formatting Kafka storage with Cluster ID: $${CLUSTER_ID}\"
          /opt/kafka/bin/kafka-storage.sh format -t $${CLUSTER_ID} -c /opt/kafka/config/server.properties
        else
          echo \"Kafka storage already formatted\"
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
      "
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafkaui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafkaui
    networks:
      - kafka-net
    ports:
      - "0.0.0.0:8082:8080"  # UI runs on 8080 internally → mapped to 8082 on host
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "QUALIF CLUSTER"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: telecom-keycloak
    networks:
      - kafka-net
    ports:
      - "8081:8080"  # Keycloak runs on 8080 internally → mapped to 8081 on host
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: telecom-prometheus
    networks:
      - kafka-net
    ports:
      - "9090:9090"
    volumes:
      - ./volumes/prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  grafana:
      image: grafana/grafana:latest
      container_name: telecom-grafana
      networks:
        - kafka-net
      ports:
        # Changed host port to 3001 so it doesn't conflict with Next.js on 3000
        - "3000:3000" 
      user: "${UID:-1000}:${GID:-1000}"
      environment:
        GF_SECURITY_ADMIN_PASSWORD: "admin"
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/system-overview.json
        # --- NEW SETTINGS FOR NEXT.JS INTEGRATION ---
        GF_SECURITY_ALLOW_EMBEDDING: "true"
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
        # Optional: If you run into cross-origin cookie issues in the browser, uncomment this:
        # GF_SECURITY_COOKIE_SAMESITE: "none"
      volumes:
        - ./volumes/grafana-data:/var/lib/grafana
        - ./monitoring/grafana-provisioning-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml
        - ./monitoring/grafana-provisioning-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
        - ./monitoring/dashboards:/var/lib/grafana/dashboards
      depends_on:
        - prometheus
      restart: unless-stopped

networks:
  kafka-net:
    driver: bridge