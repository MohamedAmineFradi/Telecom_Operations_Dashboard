services:
  traffic-service:
    build:
      context: .
      dockerfile: traffic-service/Dockerfile
    container_name: telecom-traffic-service
    networks:
      - kafka-net
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: TRAFFIC-SERVICE
      APP_STREAMING_ENABLED: "true"
      SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR: /var/lib/kafka-streams
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -Xms2g
        -Xmx2g
        -XX:MaxDirectMemorySize=256m
        -XX:MaxMetaspaceSize=256m
        -XX:ReservedCodeCacheSize=128m
        -XX:+UseG1GC
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    volumes:
      - ./volumes/traffic-state:/var/lib/kafka-streams
    restart: unless-stopped
    mem_reservation: 1024m
    mem_limit: 3072m
    memswap_limit: 4096m
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"
  sms-service:
    build:
      context: .
      dockerfile: sms-service/Dockerfile
    container_name: telecom-sms-service
    networks:
      - kafka-net
    ports:
      - "8086:8086"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: SMS-SERVICE
      APP_STREAMING_ENABLED: "true"
      SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR: /var/lib/kafka-streams
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    volumes:
      - ./volumes/sms-state:/var/lib/kafka-streams
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  call-service:
    build:
      context: .
      dockerfile: call-service/Dockerfile
    container_name: telecom-call-service
    networks:
      - kafka-net
    ports:
      - "8087:8087"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: CALL-SERVICE
      APP_STREAMING_ENABLED: "true"
      SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR: /var/lib/kafka-streams
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    volumes:
      - ./volumes/call-state:/var/lib/kafka-streams
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  internet-service:
    build:
      context: .
      dockerfile: internet-service/Dockerfile
    container_name: telecom-internet-service
    networks:
      - kafka-net
    ports:
      - "8088:8088"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: INTERNET-SERVICE
      APP_STREAMING_ENABLED: "true"
      SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR: /var/lib/kafka-streams
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    volumes:
      - ./volumes/internet-state:/var/lib/kafka-streams
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    container_name: telecom-alert-service
    networks:
      - kafka-net
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: ALERT-SERVICE
      APP_STREAMING_ENABLED: "false"
      TRAFFIC_SERVICE_BASE_URL: http://traffic-service:8080
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    mem_reservation: 1024m
    mem_limit: 3072m
    memswap_limit: 4096m
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  cell-service:
    build:
      context: .
      dockerfile: cell-service/Dockerfile
    container_name: telecom-cell-service
    networks:
      - kafka-net
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: CELL-SERVICE
      APP_STREAMING_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    mem_reservation: 1024m
    mem_limit: 3072m
    memswap_limit: 4096m
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  mobility-service:
    build:
      context: .
      dockerfile: mobility-service/Dockerfile
    container_name: telecom-mobility-service
    networks:
      - kafka-net
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_APPLICATION_NAME: MOBILITY-SERVICE
      APP_STREAMING_ENABLED: "true"
      SPRING_KAFKA_STREAMS_PROPERTIES_STATE_DIR: /var/lib/kafka-streams
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -Xms2g
        -Xmx2g
        -XX:MaxMetaspaceSize=256m
        -XX:ReservedCodeCacheSize=128m
        -XX:+UseG1GC
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    volumes:
      - ./volumes/mobility-state:/var/lib/kafka-streams
    restart: unless-stopped
    mem_reservation: 1024m
    mem_limit: 3072m
    memswap_limit: 4096m
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: telecom-producer
    networks:
      - kafka-net
    ports:
      - "8089:8080"
    environment:
      DB_URL: jdbc:postgresql://milan_etl_postgres:5432/milan_telecom
      DB_USER: postgres
      DB_PASS: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      EUREKA_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "milan_etl_postgres:host-gateway"
      - "host.docker.internal:host-gateway"

  eureka-server:
    image: steeltoeoss/eureka-server:latest
    container_name: telecom-eureka
    networks:
      - kafka-net
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTERWITH_EUREKA=false
      - EUREKA_CLIENT_FETCHREGISTRY=false
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
    mem_reservation: 128m
    mem_limit: 384m
    memswap_limit: 768m
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.1
    hostname: kafka
    container_name: telecom-kafka
    networks:
      - kafka-net
    ports:
      - "9092:9092"   # External clients
    environment:
      # Used by manual format command below
      CLUSTER_ID: "4L6g3nShT8qIEaYHq5ZqWA"

      # Ultra-conservative profile for Docker Desktop/laptop memory constraints.
      KAFKA_HEAP_OPTS: >-
        -Xms128m
        -Xmx256m
        -XX:MaxDirectMemorySize=128m
        -XX:MaxMetaspaceSize=96m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=100
        -XX:+ExplicitGCInvokesConcurrent
      KAFKA_OPTS: >-
        -javaagent:/opt/kafka/monitoring/jmx_prometheus_javaagent-1.0.1.jar=7071:/opt/kafka/monitoring/kafka-jmx-config.yml
    volumes:
      - ./volumes/kafka-data:/opt/kafka/data
      - ./monitoring/kafka-server.properties:/opt/kafka/config/server.properties
      - ./monitoring/jmx_prometheus_javaagent-1.0.1.jar:/opt/kafka/monitoring/jmx_prometheus_javaagent-1.0.1.jar:ro
      - ./monitoring/kafka-jmx-config.yml:/opt/kafka/monitoring/kafka-jmx-config.yml:ro
    # Keep hard RAM cap small, but allow swap cushion to avoid immediate OOM-kill spikes.
    mem_reservation: 1024m
    mem_limit: 3072m
    memswap_limit: 4096m
    restart: unless-stopped
    command: >
      bash -c "
        if [ ! -f /opt/kafka/data/meta.properties ]; then
          echo \"Formatting Kafka storage with Cluster ID: $${CLUSTER_ID}\"
          /opt/kafka/bin/kafka-storage.sh format -t $${CLUSTER_ID} -c /opt/kafka/config/server.properties
        else
          echo \"Kafka storage already formatted\"
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
      "
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  kafkaui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafkaui
    networks:
      - kafka-net
    ports:
      - "0.0.0.0:8082:8080"  # UI runs on 8080 internally → mapped to 8082 on host
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: "QUALIF CLUSTER"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: telecom-keycloak
    networks:
      - kafka-net
    ports:
      - "8081:8080"  # Keycloak runs on 8080 internally → mapped to 8081 on host
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: telecom-prometheus
    networks:
      - kafka-net
    ports:
      - "9090:9090"
    volumes:
      - ./volumes/prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    restart: unless-stopped

  grafana:
      image: grafana/grafana:11.5.2
      container_name: telecom-grafana
      networks:
        - kafka-net
      ports:
        # Changed host port to 3001 so it doesn't conflict with Next.js on 3000
        - "3000:3000" 
      user: "${UID:-1000}:${GID:-1000}"
      environment:
        GF_SECURITY_ADMIN_PASSWORD: "admin"
        GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/system-overview.json
        # --- NEW SETTINGS FOR NEXT.JS INTEGRATION ---
        GF_SECURITY_ALLOW_EMBEDDING: "true"
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
        # Optional: If you run into cross-origin cookie issues in the browser, uncomment this:
        # GF_SECURITY_COOKIE_SAMESITE: "none"
      volumes:
        - ./volumes/grafana-data:/var/lib/grafana
        - ./monitoring/grafana-provisioning-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml
        - ./monitoring/grafana-provisioning-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
        - ./monitoring/dashboards:/var/lib/grafana/dashboards
      depends_on:
        - prometheus
      restart: unless-stopped

networks:
  kafka-net:
    driver: bridge